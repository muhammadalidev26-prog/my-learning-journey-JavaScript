<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conditionals JavaScript | Learning JavaScript</title>

  <style>
    input {
      padding: 8px 10px;
      outline: none;
      font-size: 1.2rem;
      background-color: #f0f0f0;
      border: 1px solid grey;
      border-radius: 5px;
    }

    button {
      padding: 8px 20px;
      background-color: #f0f0f0;
      outline: none;
      border: 1px solid grey;
      border-radius: 5px;
      font-size: 1.2rem
    }

    label {
      font: 1.3rem / 1.4 "Gill Sans", sans-serif;
    }
  </style>
</head>

<body>

  <form action="" id="myForm">
    <label for="adones">Boss:</label>
    <input type="text" name="boss" id="adones" placeholder="Who is the boss?" required>
    <button type="submit">Submit</button>
  </form>

  <script src="index.js"></script>
</body>

</html>
